name: smoke-test

# Verifies the locked environment still installs and imports cleanly.
# Catches breakage before students hit it in a Binder session.

on:
  push:
    branches: [main]
    paths:
      - requirements.txt
      - requirements.in
      - runtime.txt
      - apt.txt
      - postBuild
      - .github/workflows/smoke-test.yml
  pull_request:
    paths:
      - requirements.txt
      - requirements.in
      - runtime.txt
      - apt.txt
      - postBuild
  schedule:
    # Weekly, Mondays 12:00 UTC. Surfaces upstream breakage early.
    - cron: '0 12 * * 1'
  workflow_dispatch:

jobs:
  import-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Detect Python version from QSDsan's pyproject.toml
        id: pyver
        run: |
          QSDSAN_VERSION=$(grep -oP '(?<=qsdsan==)\d+\.\d+\.\d+' requirements.in)
          PY_VER=$(curl -fsSL \
            "https://raw.githubusercontent.com/QSD-Group/QSDsan/v${QSDSAN_VERSION}/pyproject.toml" \
            | grep -oP 'requires-python\s*=\s*"\s*>=\s*\K\d+\.\d+')
          if [ -z "$PY_VER" ]; then
            echo "Failed to parse requires-python from QSDsan v${QSDSAN_VERSION} pyproject.toml" >&2
            exit 1
          fi
          echo "version=${PY_VER}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ steps.pyver.outputs.version }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y graphviz

      - name: Install locked Python deps
        run: pip install --require-hashes -r requirements.txt

      - name: Import QSDsan stack and print versions
        run: |
          python - <<'PY'
          import importlib
          pkgs = ['qsdsan', 'exposan', 'biosteam', 'thermosteam',
                  'numpy', 'scipy', 'numba', 'pandas', 'matplotlib',
                  'chaospy', 'skfda']
          for name in pkgs:
              mod = importlib.import_module(name)
              print(f'{name:<14} {getattr(mod, "__version__", "n/a")}')
          PY
